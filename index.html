<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyntherax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* ===== ANLIK GORUNEN FALLBACK ===== */
        .fallback-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -3;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(120, 50, 255, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 110, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(58, 134, 255, 0.1) 0%, transparent 60%),
                #050510;
            overflow: hidden;
        }

        .gradient-mesh {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 30% 70%, rgba(120, 50, 255, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 70% 30%, rgba(255, 0, 110, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(58, 134, 255, 0.1) 0%, transparent 50%);
            animation: meshMove 15s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-5%, 5%) rotate(2deg); }
            66% { transform: translate(5%, -5%) rotate(-2deg); }
        }

        .mouse-glow {
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(120, 50, 255, 0.25) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: opacity 0.2s ease;
            opacity: 0;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: floatShape 12s ease-in-out infinite;
        }

        .shape-1 { width: 400px; height: 400px; background: rgba(120, 50, 255, 0.3); top: 10%; left: 5%; animation-delay: 0s; }
        .shape-2 { width: 300px; height: 300px; background: rgba(255, 0, 110, 0.2); top: 60%; right: 10%; animation-delay: -4s; }
        .shape-3 { width: 350px; height: 350px; background: rgba(58, 134, 255, 0.2); bottom: 5%; left: 35%; animation-delay: -8s; }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.05); }
        }

        .grid-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(120, 50, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120, 50, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 8s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* ===== VIDEO ===== */
        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: #000;
        }

        .video-bg.ready {
            opacity: 1;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-10vh) translateX(60px); opacity: 0; }
        }

        /* Mouse */
        .cursor {
            position: fixed;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.08s ease-out, width 0.2s ease, height 0.2s ease;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        .cursor-dot {
            position: fixed;
            width: 5px; height: 5px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cursor.hover {
            width: 45px; height: 45px;
            border-color: rgba(120, 50, 255, 0.8);
            background: rgba(120, 50, 255, 0.1);
        }

        .trail {
            position: fixed;
            width: 6px; height: 6px;
            background: rgba(120, 50, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            animation: trailFade 0.5s ease-out forwards;
        }

        @keyframes trailFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 40px rgba(255, 255, 255, 0.4),
                0 0 80px rgba(255, 255, 255, 0.2);
            animation:
                typewriter 4s steps(9) infinite,
                shake 0.1s infinite,
                glowPulse 2s ease-in-out infinite;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid rgba(255, 255, 255, 0.8);
            width: 0;
        }

        @keyframes typewriter {
            0%, 100% { width: 0; border-right-color: rgba(255, 255, 255, 0.8); }
            40% { width: 100%; border-right-color: rgba(255, 255, 255, 0.8); }
            50% { width: 100%; border-right-color: transparent; }
            60% { width: 100%; border-right-color: rgba(255, 255, 255, 0.8); }
            90% { width: 0; border-right-color: rgba(255, 255, 255, 0.8); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1px, 1px); }
            20% { transform: translate(1px, -1px); }
            30% { transform: translate(-1px, -1px); }
            40% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, 0); }
            60% { transform: translate(1px, 0); }
            70% { transform: translate(0, 1px); }
            80% { transform: translate(0, -1px); }
            90% { transform: translate(1px, 1px); }
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,255,255,0.4), 0 0 80px rgba(255,255,255,0.2); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.6), 0 0 100px rgba(255,255,255,0.4); }
        }

        .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px; height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            animation: logoPulse 2s ease-in-out infinite;
            margin-bottom: 15px;
        }

        .roblox-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }

        .roblox-btn:hover::before { left: 100%; }
        .roblox-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 10px 30px rgba(120, 50, 255, 0.3);
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(120, 50, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(120, 50, 255, 0.4); }
        }

        .roblox-icon { width: 28px; height: 28px; object-fit: contain; }

        .profile-gif {
            width: 140px; height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5) border-box;
            background-size: 400% 400%;
            animation: borderRotate 4s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 50px rgba(120, 50, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .profile-gif:hover {
            transform: scale(1.08) translateZ(0);
            box-shadow: 0 0 70px rgba(120, 50, 255, 0.5);
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== CEREN CICEGI - YENI TASARIM ===== */
        .flower-wrapper {
            position: relative;
            width: 160px; height: 160px;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flower {
            position: relative;
            width: 110px; height: 110px;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 20px rgba(255, 0, 110, 0.5));
        }

        .flower-wrapper:hover .flower {
            transform: scale(1.1);
            filter: drop-shadow(0 0 35px rgba(255, 0, 110, 0.8));
        }

        .flower-wrapper:active .flower { transform: scale(0.95); }

        /* Yapraklar - 3D katmanli gul */
        .petal {
            position: absolute;
            width: 38px;
            height: 58px;
            background: linear-gradient(180deg,
                rgba(255, 20, 147, 0.95) 0%,
                rgba(255, 0, 80, 0.9) 30%,
                rgba(139, 0, 60, 0.85) 70%,
                rgba(80, 0, 40, 0.9) 100%);
            border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
            top: 50%; left: 50%;
            transform-origin: center bottom;
            box-shadow:
                0 0 20px rgba(255, 20, 147, 0.6),
                0 0 40px rgba(255, 0, 80, 0.3),
                inset 0 -5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 150, 200, 0.3);
        }

        /* Dis katman yapraklar */
        .petal:nth-child(1) { transform: translate(-50%, -100%) rotate(0deg); z-index: 1; }
        .petal:nth-child(2) { transform: translate(-50%, -100%) rotate(60deg); z-index: 1; }
        .petal:nth-child(3) { transform: translate(-50%, -100%) rotate(120deg); z-index: 1; }
        .petal:nth-child(4) { transform: translate(-50%, -100%) rotate(180deg); z-index: 1; }
        .petal:nth-child(5) { transform: translate(-50%, -100%) rotate(240deg); z-index: 1; }
        .petal:nth-child(6) { transform: translate(-50%, -100%) rotate(300deg); z-index: 1; }

        /* Ic katman yapraklar */
        .petal:nth-child(7) { transform: translate(-50%, -95%) rotate(30deg) scale(0.75); z-index: 2; opacity: 0.9; }
        .petal:nth-child(8) { transform: translate(-50%, -95%) rotate(90deg) scale(0.75); z-index: 2; opacity: 0.9; }
        .petal:nth-child(9) { transform: translate(-50%, -95%) rotate(150deg) scale(0.75); z-index: 2; opacity: 0.9; }
        .petal:nth-child(10) { transform: translate(-50%, -95%) rotate(210deg) scale(0.75); z-index: 2; opacity: 0.9; }
        .petal:nth-child(11) { transform: translate(-50%, -95%) rotate(270deg) scale(0.75); z-index: 2; opacity: 0.9; }
        .petal:nth-child(12) { transform: translate(-50%, -95%) rotate(330deg) scale(0.75); z-index: 2; opacity: 0.9; }

        /* Acilis animasyonu - dis katman */
        .flower-wrapper.opened .petal:nth-child(1) { transform: translate(-50%, -108%) rotate(-20deg) scale(1.15); }
        .flower-wrapper.opened .petal:nth-child(2) { transform: translate(-50%, -108%) rotate(40deg) scale(1.15); }
        .flower-wrapper.opened .petal:nth-child(3) { transform: translate(-50%, -108%) rotate(100deg) scale(1.15); }
        .flower-wrapper.opened .petal:nth-child(4) { transform: translate(-50%, -108%) rotate(160deg) scale(1.15); }
        .flower-wrapper.opened .petal:nth-child(5) { transform: translate(-50%, -108%) rotate(220deg) scale(1.15); }
        .flower-wrapper.opened .petal:nth-child(6) { transform: translate(-50%, -108%) rotate(280deg) scale(1.15); }

        /* Acilis animasyonu - ic katman */
        .flower-wrapper.opened .petal:nth-child(7) { transform: translate(-50%, -102%) rotate(10deg) scale(0.9); }
        .flower-wrapper.opened .petal:nth-child(8) { transform: translate(-50%, -102%) rotate(70deg) scale(0.9); }
        .flower-wrapper.opened .petal:nth-child(9) { transform: translate(-50%, -102%) rotate(130deg) scale(0.9); }
        .flower-wrapper.opened .petal:nth-child(10) { transform: translate(-50%, -102%) rotate(190deg) scale(0.9); }
        .flower-wrapper.opened .petal:nth-child(11) { transform: translate(-50%, -102%) rotate(250deg) scale(0.9); }
        .flower-wrapper.opened .petal:nth-child(12) { transform: translate(-50%, -102%) rotate(310deg) scale(0.9); }

        /* Cicek merkezi - 3D efekt */
        .flower-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%,
                #ffeb3b 0%,
                #ffc107 30%,
                #ff9800 60%,
                #e65100 100%);
            border-radius: 50%;
            z-index: 3;
            box-shadow:
                0 0 30px rgba(255, 193, 7, 0.8),
                0 0 60px rgba(255, 152, 0, 0.4),
                inset 0 -5px 10px rgba(0, 0, 0, 0.4),
                inset 0 3px 8px rgba(255, 255, 255, 0.4);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .flower-wrapper.opened .flower-center {
            transform: translate(-50%, -50%) scale(0.7);
            box-shadow:
                0 0 50px rgba(255, 193, 7, 1),
                0 0 100px rgba(255, 152, 0, 0.6),
                inset 0 -5px 10px rgba(0, 0, 0, 0.4);
        }

        /* Ceren yazisi */
        .flower-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-10deg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            z-index: 4;
            opacity: 0;
            text-shadow:
                0 0 10px rgba(255, 20, 147, 1),
                0 0 30px rgba(255, 0, 80, 0.8),
                0 0 60px rgba(255, 0, 80, 0.5),
                0 0 100px rgba(255, 20, 147, 0.3);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 2px;
        }

        .flower-wrapper.opened .flower-text {
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            opacity: 1;
        }

        /* Sallanma animasyonu */
        @keyframes flowerSway {
            0%, 100% { transform: rotate(-4deg) translateY(0); }
            25% { transform: rotate(2deg) translateY(-3px); }
            50% { transform: rotate(4deg) translateY(0); }
            75% { transform: rotate(-2deg) translateY(-2px); }
        }

        .flower-wrapper:not(.opened) .flower {
            animation: flowerSway 4s ease-in-out infinite;
            transform-origin: center bottom;
        }

        /* Parilti efekti */
        .flower-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 0; height: 0;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255, 20, 147, 0.7) 0%,
                rgba(255, 0, 80, 0.4) 30%,
                transparent 70%);
            opacity: 0;
            transition: all 1s ease;
            pointer-events: none;
            z-index: 0;
        }

        .flower-wrapper.opened .flower-glow {
            width: 280px; height: 280px;
            opacity: 1;
        }

        /* Neon halka */
        .flower-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(45deg, #ff006e, #ff1493, #ff69b4) border-box;
            opacity: 0;
            transition: all 0.8s ease;
            pointer-events: none;
            z-index: -1;
        }

        .flower-wrapper.opened .flower-ring {
            opacity: 0.6;
            width: 200px; height: 200px;
            animation: ringPulse 2s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        /* Kalp parcaciklari */
        .heart-particle {
            position: absolute;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
            animation: heartFloat 2s ease-out forwards;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.8));
        }

        @keyframes heartFloat {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            20% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 1; }
            100% { transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5 - 50px)) scale(0) rotate(calc(var(--rot) * 2)); opacity: 0; }
        }

        /* Ipucu yazisi */
        .flower-hint {
            position: absolute;
            bottom: -30px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
        }

        .flower-wrapper:hover .flower-hint { opacity: 1; }

        /* Responsive */
        @media (max-width: 480px) {
            .title { font-size: 32px; letter-spacing: 3px; }
            .profile-gif { width: 110px; height: 110px; }
            .roblox-btn { width: 45px; height: 45px; }
            .roblox-icon { width: 24px; height: 24px; }
            .flower-wrapper { width: 130px; height: 130px; }
            .flower { width: 85px; height: 85px; }
            .petal { width: 30px; height: 46px; }
            .flower-center { width: 32px; height: 32px; }
            .flower-text { font-size: 13px; }
        }
    </style>
<base target="_blank">
</head>

                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
                <div class="flower-text">💕 Ceren 💕</div>
            </div>
            <div class="flower-hint">Tikla</div>
        </div>
    </div>

    <script>
        // ===== YILDIZLAR =====
        function createStars() {
            const container = document.getElementById('starsContainer');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                fragment.appendChild(star);
            }
            container.appendChild(fragment);
        }
        createStars();

        // ===== VIDEO - ANLIK YUKLEME =====
        const video = document.getElementById('videoBg');
        const fallbackBg = document.getElementById('fallbackBg');

        video.addEventListener('loadeddata', function() {
            video.classList.add('ready');
            fallbackBg.style.opacity = '0';
        });

        video.addEventListener('error', function() {
            console.log('Video yuklenemedi');
            video.style.display = 'none';
        });

        setTimeout(() => {
            if (!video.classList.contains('ready')) {
                console.log('Video timeout - fallback aktif');
            }
        }, 8000);

        // ===== MOUSE EFEKTLERI =====
        const mouseGlow = document.getElementById('mouseGlow');
        const gradientMesh = document.getElementById('gradientMesh');
        let mouseX = 0, mouseY = 0;
        let meshX = 0, meshY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseGlow.style.left = mouseX + 'px';
            mouseGlow.style.top = mouseY + 'px';
            mouseGlow.style.opacity = '1';

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            meshX = (mouseX - centerX) / centerX * 20;
            meshY = (mouseY - centerY) / centerY * 20;
            gradientMesh.style.transform = `translate(${meshX}px, ${meshY}px)`;
        });

        document.addEventListener('mouseleave', () => {
            mouseGlow.style.opacity = '0';
            gradientMesh.style.transform = 'translate(0, 0)';
        });

        // ===== PARCACIKLAR =====
        function createParticles() {
            const container = document.getElementById('particles');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 6) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                const size = Math.random() * 2 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.opacity = Math.random() * 0.4 + 0.2;
                fragment.appendChild(particle);
            }
            container.appendChild(fragment);
        }
        createParticles();

        // ===== OZEL MOUSE =====
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        let cursorX = 0, cursorY = 0;
        let trailCounter = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';

            trailCounter++;
            if (trailCounter % 3 === 0) {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.left = mouseX + 'px';
                trail.style.top = mouseY + 'px';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 500);
            }
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        document.querySelectorAll('a, .profile-gif, .flower-wrapper').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // ===== CEREN CICEGI =====
        const flower = document.getElementById('cerenFlower');
        let isOpen = false;

        flower.addEventListener('click', (e) => {
            isOpen = !isOpen;
            if (isOpen) {
                flower.classList.add('opened');
                createHeartBurst(e.clientX, e.clientY);
            } else {
                flower.classList.remove('opened');
            }
        });

        function createHeartBurst(x, y) {
            const hearts = ['💕', '💖', '💗', '💓', '💝', '❤️', '💘', '🌹', '✨'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                const angle = (Math.PI * 2 * i) / 20;
                const distance = 80 + Math.random() * 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 60;
                const rot = (Math.random() - 0.5) * 90;
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.setProperty('--tx', tx + 'px');
                heart.style.setProperty('--ty', ty + 'px');
                heart.style.setProperty('--rot', rot + 'deg');
                heart.style.animationDelay = (Math.random() * 0.3) + 's';
                heart.style.fontSize = (14 + Math.random() * 10) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 2500);
            }
        }
    </script>
</body>
</html>
