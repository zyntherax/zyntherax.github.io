<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyntherax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* YouTube Video Arka Plan */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vh;
            transform: translate(-50%, -50%);
            border: none;
            opacity: 0.9;
        }

        /* Karanlık overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        /* Parçacıklar */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: particleFloat linear infinite;
            will-change: transform, opacity;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            5% { opacity: 0.6; }
            95% { opacity: 0.6; }
            100% {
                transform: translateY(-10vh) translateX(80px);
                opacity: 0;
            }
        }

        /* Özel mouse imleci */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.08s ease-out, width 0.2s ease, height 0.2s ease;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            will-change: transform;
        }

        .cursor-dot {
            position: fixed;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        .cursor.hover {
            width: 45px;
            height: 45px;
            border-color: rgba(120, 50, 255, 0.8);
            background: rgba(120, 50, 255, 0.1);
        }

        /* Mouse trail */
        .trail {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(120, 50, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            animation: trailFade 0.6s ease-out forwards;
            will-change: transform, opacity;
        }

        @keyframes trailFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        }

        /* Ana container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Süzülen harfler - Profilin üstünde başlayıp yerini alacak */
        .floating-letter {
            position: absolute;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            will-change: transform, opacity;
            letter-spacing: 2px;
        }

        @keyframes letterSway {
            0% {
                opacity: 0;
                transform: translateY(-30px) translateX(0) rotate(-5deg);
            }
            20% {
                opacity: 1;
                transform: translateY(0) translateX(10px) rotate(3deg);
            }
            40% {
                transform: translateY(-10px) translateX(-5px) rotate(-2deg);
            }
            60% {
                transform: translateY(5px) translateX(8px) rotate(4deg);
            }
            80% {
                transform: translateY(-3px) translateX(-3px) rotate(-1deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg);
            }
        }

        @keyframes letterSettle {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
        }

        /* Başlık container */
        .title-container {
            margin-bottom: 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        .title-letter {
            display: inline-block;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: all 0.3s ease;
            position: relative;
        }

        .title-letter.visible {
            opacity: 1;
        }

        /* Başlık silinip geri gelme */
        @keyframes titleFadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; filter: blur(10px); }
        }

        @keyframes titleFadeIn {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 1; filter: blur(0); }
        }

        /* Roblox logosu */
        .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            animation: logoPulse 2s ease-in-out infinite;
            margin-bottom: 15px;
        }

        .roblox-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .roblox-btn:hover::before {
            left: 100%;
        }

        .roblox-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 10px 30px rgba(120, 50, 255, 0.3);
        }

        @keyframes logoPulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(120, 50, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 25px rgba(120, 50, 255, 0.4);
            }
        }

        .roblox-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* Profil GIF */
        .profile-gif {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5) border-box;
            background-size: 400% 400%;
            animation: borderRotate 4s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 50px rgba(120, 50, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .profile-gif:hover {
            transform: scale(1.08) translateZ(0);
            box-shadow: 0 0 70px rgba(120, 50, 255, 0.5);
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Alt yazı */
        .subtitle {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            letter-spacing: 2px;
            animation: textFlicker 4s ease-in-out infinite;
        }

        @keyframes textFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .floating-letter { font-size: 32px; }
            .title-letter { font-size: 32px; }
            .profile-gif { width: 110px; height: 110px; }
            .roblox-btn { width: 45px; height: 45px; }
            .roblox-icon { width: 24px; height: 24px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- YouTube Video Arka Plan -->
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/9y4UGT0GW6Y?autoplay=1&mute=1&loop=1&playlist=9y4UGT0GW6Y&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&playsinline=1&vq=hd1080"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>
    <div class="overlay"></div>

    <!-- Parçacıklar -->
    <div class="particles" id="particles"></div>

    <!-- Özel mouse imleci -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- Ana içerik -->
    <div class="container">
        <!-- Başlık - Harfler süzülerek geliyor -->
        <div class="title-container" id="titleContainer"></div>

        <!-- Roblox logosu -->
        <a href="https://www.roblox.com/tr/users/1582566009/profile" 
           class="roblox-btn" 
           target="_blank"
           title="Roblox Profilim">
            <img src="https://media.tenor.com/HO1YAH0_iMcAAAAj/roblox-logo.gif" 
                 alt="Roblox" 
                 class="roblox-icon">
        </a>

        <!-- Profil GIF -->
        <img src="https://i.pinimg.com/originals/87/8c/53/878c5376b10b2f842a06fae2d386c463.gif" 
             alt="profile" 
             class="profile-gif">

        <!-- Alt yazı -->
        <p class="subtitle">currently doing nothing</p>
    </div>

    <script>
        const titleText = "zyntherax";
        const titleContainer = document.getElementById('titleContainer');

        // Başlık harflerini oluştur (başlangıçta gizli)
        function createTitleLetters() {
            titleContainer.innerHTML = '';
            const letters = titleText.split('');
            letters.forEach((char) => {
                const span = document.createElement('span');
                span.className = 'title-letter';
                span.textContent = char;
                titleContainer.appendChild(span);
            });
        }
        createTitleLetters();

        // Harfleri süzülerek göster
        function animateLettersIn() {
            const letters = document.querySelectorAll('.title-letter');
            const containerRect = titleContainer.getBoundingClientRect();
            const containerCenterX = containerRect.left + containerRect.width / 2;
            const containerTopY = containerRect.top;

            // Her harf için süzülme animasyonu
            letters.forEach((letter, index) => {
                // Harfi geçici olarak absolute pozisyona al
                letter.style.position = 'fixed';
                letter.style.opacity = '0';
                letter.style.zIndex = '100';

                // Başlangıç pozisyonu - profilin üstünden başlayıp hafifçe sallanarak
                const startX = containerCenterX - (titleText.length * 12) + (index * 24);
                const startY = containerTopY - 80;

                letter.style.left = startX + 'px';
                letter.style.top = startY + 'px';

                // Süzülme animasyonu - yaprak gibi sallanarak
                setTimeout(() => {
                    letter.style.transition = 'all 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
                    letter.style.opacity = '1';

                    // Hedef pozisyon
                    const targetX = containerCenterX - (titleText.length * 12) + (index * 24);
                    const targetY = containerTopY + 10;

                    // Yaprak gibi sallanarak ilerleme
                    let progress = 0;
                    const duration = 1500;
                    const startTime = Date.now();

                    function sway() {
                        const elapsed = Date.now() - startTime;
                        progress = Math.min(elapsed / duration, 1);

                        // Ease out
                        const ease = 1 - Math.pow(1 - progress, 3);

                        // Yaprak gibi sallanma
                        const swayX = Math.sin(progress * Math.PI * 3) * 15 * (1 - progress);
                        const swayY = Math.sin(progress * Math.PI * 2) * 10 * (1 - progress);

                        const currentX = startX + (targetX - startX) * ease + swayX;
                        const currentY = startY + (targetY - startY) * ease + swayY;
                        const rotation = Math.sin(progress * Math.PI * 4) * 10 * (1 - progress);

                        letter.style.left = currentX + 'px';
                        letter.style.top = currentY + 'px';
                        letter.style.transform = `rotate(${rotation}deg)`;

                        if (progress < 1) {
                            requestAnimationFrame(sway);
                        } else {
                            // Animasyon bitti - yerine yerleştir
                            letter.style.position = 'relative';
                            letter.style.left = 'auto';
                            letter.style.top = 'auto';
                            letter.style.transform = 'none';
                            letter.classList.add('visible');
                        }
                    }

                    requestAnimationFrame(sway);
                }, index * 200);
            });

            // Tüm harfler yerleştikten sonra silinip geri gelme döngüsü
            setTimeout(() => {
                startDisappearCycle();
            }, 4000);
        }

        // Harfleri silip geri getir
        function startDisappearCycle() {
            const letters = document.querySelectorAll('.title-letter');

            // Önce sil
            letters.forEach((letter, index) => {
                setTimeout(() => {
                    letter.style.transition = 'all 0.5s ease';
                    letter.style.opacity = '0';
                    letter.style.transform = 'translateY(-20px) scale(0.8)';
                }, index * 50);
            });

            // Sonra geri getir
            setTimeout(() => {
                letters.forEach(letter => {
                    letter.classList.remove('visible');
                    letter.style.transform = 'none';
                });
                animateLettersIn();
            }, 2000);
        }

        // Sayfa açıldığında başlat
        window.addEventListener('load', () => {
            setTimeout(animateLettersIn, 300);
        });

        // Parçacık oluştur
        function createParticles() {
            const container = document.getElementById('particles');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
                particle.style.animationDelay = Math.random() * 12 + 's';
                const size = Math.random() * 2 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.opacity = Math.random() * 0.4 + 0.2;
                fragment.appendChild(particle);
            }
            container.appendChild(fragment);
        }
        createParticles();

        // Özel mouse imleci
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let trailCounter = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';

            trailCounter++;
            if (trailCounter % 3 === 0) {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.left = mouseX + 'px';
                trail.style.top = mouseY + 'px';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 600);
            }
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.12;
            cursorY += (mouseY - cursorY) * 0.12;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Hover efekti
        document.querySelectorAll('a, .profile-gif').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
    </script>
</body>
</html>
