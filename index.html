<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyntherax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Hareketli gradient arka plan */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 50, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 50, 150, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(50, 150, 255, 0.08) 0%, transparent 50%);
            animation: gradientMove 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 40px 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profil fotoğrafı */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .avatar-wrapper:hover .avatar {
            transform: scale(1.05);
        }

        /* Glow efekti arkası */
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            z-index: 1;
            animation: glowRotate 3s ease infinite;
            opacity: 0.7;
            filter: blur(8px);
        }

        @keyframes glowRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* İsim */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* Açıklama */
        .bio {
            color: #888;
            font-size: 15px;
            margin-bottom: 32px;
            font-weight: 300;
            line-height: 1.5;
        }

        /* Sosyal ikonlar */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .social-icons a {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .social-icons a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Link butonları */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            position: relative;
            display: block;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        /* Alt bilgi */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #444;
            font-weight: 300;
        }

        /* Mobil uyum */
        @media (max-width: 480px) {
            h1 { font-size: 30px; }
            .avatar { width: 110px; height: 110px; }
            .link-btn { padding: 14px 20px; }
        }

        /* Yazı animasyonu */
        .typing {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(255, 255, 255, 0.5);
            animation: typing 2s steps(20, end), blink 0.8s step-end infinite;
            max-width: 100%;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profil Fotoğrafı: src kısmına kendi fotoğraf linkini koy -->
        <div class="avatar-wrapper">
            <img src="https://i.pravatar.cc/130" alt="profil" class="avatar">
        </div>

        <!-- İsim: Burayı kendi isminle değiştir -->
        <h1>zyntherax</h1>

        <!-- Açıklama: Buraya kendi açıklamanı yaz -->
        <p class="bio">developer • designer • creator</p>

        <!-- Sosyal İkonlar: İstediğini ekle/çıkar -->
        <div class="social-icons">
            <a href="https://discord.com/users/zyntherax" title="Discord"></a>
        </div>

        <!-- Link Butonları: href ve yazıyı değiştir, istediğin kadar çoğalt -->
        <div class="links">

        </div>

        <div class="footer">zyntherax</div>
    </div>
</body>
</html>
