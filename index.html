<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyntherax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* Tam ekran video arka plan */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.7) contrast(1.1);
        }

        /* Karanlık overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* Parçacıklar */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(50px);
                opacity: 0;
            }
        }

        /* Ses butonu */
        .sound-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .sound-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* Ana container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Başlık */
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
                transform: translate(0);
            }
            92% {
                text-shadow: -2px 0 #ff0040, 2px 0 #00ff9f;
                transform: translate(2px, -1px);
            }
            94% {
                text-shadow: 2px 0 #ff0040, -2px 0 #00ff9f;
                transform: translate(-2px, 1px);
            }
            96% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
                transform: translate(0);
            }
        }

        /* Profil kartı */
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px 32px;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff0040, #00ff9f, #7000ff, #ff0040);
            background-size: 400% 400%;
            border-radius: 26px;
            z-index: -1;
            animation: borderGlow 3s ease infinite;
            opacity: 0.5;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        /* Avatar */
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .avatar-wrapper {
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #ff4444;
            border: 2px solid rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        /* Profil bilgileri */
        .profile-info {
            text-align: left;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            color: #ccc;
        }

        .verified {
            color: #7000ff;
            font-size: 14px;
        }

        .profile-bio {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        /* Sosyal ikonlar */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .social-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .social-icon:hover::before {
            opacity: 1;
        }

        .social-icon:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Görüntülenme sayacı */
        .views {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #888;
            font-size: 13px;
            margin-top: 10px;
        }

        .views svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .title {
                font-size: 36px;
            }
            .profile-card {
                padding: 18px 24px;
            }
            .avatar {
                width: 50px;
                height: 50px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Arka plan görseli (video yerine animasyonlu görsel) -->
    <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1920&q=80" class="video-bg" alt="bg">
    <div class="overlay"></div>

    <!-- Parçacıklar -->
    <div class="particles" id="particles"></div>

    <!-- Ses butonu -->
    <div class="sound-btn" onclick="toggleSound()">🔇</div>

    <!-- Ana içerik -->
    <div class="container">
        <!-- Başlık -->
        <h1 class="title">ZynTheRax</h1>

        <!-- Profil Kartı -->
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img src="https://i.pravatar.cc/150?img=11" alt="avatar" class="avatar">
                <div class="online-indicator"></div>
            </div>
            <div class="profile-info">
                <div class="profile-name">
                    zyntherax
                    <span class="badge">
                        <span>💎</span>
                        RBLX
                    </span>
                    <span class="verified">✓</span>
                </div>
                <div class="profile-bio">currently doing nothing</div>
            </div>
        </div>

        <!-- Sosyal Linkler -->
        <div class="social-links">
            <a href="https://discord.com" class="social-icon" title="Discord">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">

                </svg>
            </a>
        <!-- Görüntülenme -->
        <div class="views">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <span>48</span>
        </div>
    </div>

    <script>
        // Parçacık oluştur
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = (Math.random() * 3 + 1) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        createParticles();

        // Ses butonu
        let soundOn = false;
        function toggleSound() {
            soundOn = !soundOn;
            document.querySelector('.sound-btn').textContent = soundOn ? '🔊' : '🔇';
        }
    </script>
</body>
</html>
