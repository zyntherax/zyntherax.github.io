<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyntherax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* YouTube Video Arka Plan */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            min-width: 177.77vh;
            min-height: 56.25vw;
        }

        /* Karanlık overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Parçacıklar */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: particleFloat linear infinite;
            will-change: transform, opacity;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            5% {
                opacity: 0.6;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) translateX(80px);
                opacity: 0;
            }
        }

        /* Özel mouse imleci */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.08s ease-out, width 0.2s ease, height 0.2s ease;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            will-change: transform;
        }

        .cursor-dot {
            position: fixed;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        .cursor.hover {
            width: 45px;
            height: 45px;
            border-color: rgba(120, 50, 255, 0.8);
            background: rgba(120, 50, 255, 0.1);
        }

        /* Mouse trail */
        .trail {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(120, 50, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            animation: trailFade 0.6s ease-out forwards;
            will-change: transform, opacity;
        }

        @keyframes trailFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        }

        /* Ana container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Başlık */
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 56px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 35px;
            letter-spacing: 6px;
            text-transform: uppercase;
            animation: titleGlow 4s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(120, 50, 255, 0.4);
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(120, 50, 255, 0.5),
                            0 0 40px rgba(120, 50, 255, 0.3),
                            0 0 60px rgba(120, 50, 255, 0.1);
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 50, 150, 0.5),
                            0 0 60px rgba(255, 50, 150, 0.3),
                            0 0 90px rgba(255, 50, 150, 0.1);
            }
        }

        /* Profil GIF - 60fps smooth */
        .profile-gif {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5) border-box;
            background-size: 400% 400%;
            animation: borderRotate 4s linear infinite;
            margin-bottom: 30px;
            box-shadow: 0 0 50px rgba(120, 50, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            will-change: transform;
            /* GPU acceleration for smooth GIF */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .profile-gif:hover {
            transform: scale(1.08) translateZ(0);
            box-shadow: 0 0 70px rgba(120, 50, 255, 0.5);
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Roblox butonu */
        .roblox-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1.5s ease-out 0.3s both;
        }

        .roblox-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .roblox-btn:hover::before {
            left: 100%;
        }

        .roblox-btn:hover {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            letter-spacing: 2px;
        }

        /* Alt yazı */
        .subtitle {
            margin-top: 18px;
            font-size: 13px;
            color: #777;
            letter-spacing: 2px;
            animation: fadeInUp 1.8s ease-out 0.6s both;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .title { font-size: 38px; letter-spacing: 3px; }
            .profile-gif { width: 130px; height: 130px; }
            .roblox-btn { padding: 14px 28px; font-size: 15px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- YouTube Video Arka Plan -->
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/9y4UGT0GW6Y?autoplay=1&mute=1&loop=1&playlist=9y4UGT0GW6Y&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1&vq=hd1080"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>
    <div class="overlay"></div>

    <!-- Parçacıklar -->
    <div class="particles" id="particles"></div>

    <!-- Özel mouse imleci -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- Ana içerik -->
    <div class="container">
        <h1 class="title">zyntherax</h1>

        <img src="https://i.pinimg.com/originals/87/8c/53/878c5376b10b2f842a06fae2d386c463.gif" 
             alt="profile" 
             class="profile-gif">

        <a href="https://www.roblox.com/tr/users/1582566009/profile" 
           class="roblox-btn" 
           target="_blank">
            Roblox
        </a>

        <p class="subtitle">currently doing nothing</p>
    </div>

    <script>
        // Parçacık oluştur - optimize
        function createParticles() {
            const container = document.getElementById('particles');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
                particle.style.animationDelay = Math.random() * 12 + 's';
                const size = Math.random() * 2 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.opacity = Math.random() * 0.4 + 0.2;
                fragment.appendChild(particle);
            }
            container.appendChild(fragment);
        }
        createParticles();

        // Özel mouse imleci - 60fps smooth
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let trailCounter = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';

            // Trail efekti - optimize
            trailCounter++;
            if (trailCounter % 3 === 0) {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.left = mouseX + 'px';
                trail.style.top = mouseY + 'px';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 600);
            }
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.12;
            cursorY += (mouseY - cursorY) * 0.12;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Hover efekti
        document.querySelectorAll('a, .profile-gif').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
    </script>
</body>
</html>
